<html>
<head>
    <title>SRS WebRTC Server</title>
    <meta charset="utf-8">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; line-height: 1.6; color: #333; }
        h3 a { color: #333; text-decoration: none; }
        a { color: #0366d6; }
        pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow: auto; font-size: 14px; }
        .links { margin: 20px 0; }
        .links a { display: inline-block; margin-right: 16px; }
        footer { margin-top: 40px; color: #999; font-size: 13px; }
    </style>
</head>
<body>
    <h3><a href="https://github.com/ossrs/srs">SRS WebRTC Server</a></h3>

    <div class="links">
        <a id="enConsole" href="#">Console</a>
        <a id="enPlayer" href="#">Player</a>
    </div>

    <p>Publish a stream with <a href="https://ffmpeg.org/download.html">FFmpeg</a> or <a href="https://obsproject.com/download">OBS</a>:</p>
    <pre id="url"></pre>

    <p>Or publish via WHIP from a browser — see the <a id="whipLink" href="players/whip.html">WHIP publisher</a>.</p>

    <footer>
        <p>Powered by <a href="https://github.com/ossrs/srs">SRS</a></p>
    </footer>

    <script>
        document.getElementById('url').innerText = `rtmp://${window.location.hostname}/live/livestream`;

        const prefix = `${window.location.protocol}//${window.location.host}`;
        const query = parseInt(window.location.port) === 8080 ? '?port=1985' : '';
        document.getElementById('enConsole').href = `${prefix}/console/en_index.html#/summaries${query}`;

        const playerPrefix = `players/?schema=${window.location.protocol.replace(':', '')}`;
        const httpPort = window.location.port || (window.location.protocol === 'http:' ? 80 : 443);
        const playerQuery = parseInt(window.location.port) === 8080 ? '' : `&port=${httpPort}&api=${httpPort}`;
        document.getElementById('enPlayer').href = `${playerPrefix}${playerQuery}`;
    </script>
</body>
</html>
