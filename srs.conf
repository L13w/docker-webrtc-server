listen              1935;
max_connections     1000;
daemon              off;
srs_log_tank        console;

http_server {
    enabled         on;
    listen          8080;
    dir             ./objs/nginx/html;
}

http_api {
    enabled         on;
    listen          1985;
    crossdomain     on;
}

rtc_server {
    enabled         on;
    listen          8000;
    # Set via CANDIDATE_IP env var or AUTO_DETECT_IP=true at runtime.
    # Must be your server's public IP for WebRTC to work.
    candidate       auto_detect;
    # TCP fallback for environments where UDP is blocked (e.g. Docker Desktop)
    tcp {
        enabled     on;
        listen      8000;
    }
    protocol        all;
}

vhost __defaultVhost__ {
    publish {
        normal_timeout  120000;
    }

    play {
        gop_cache       off;
        queue_length    0;
        mw_latency      0;
    }

    rtc {
        enabled     on;
        # RTMP publishers are available as WebRTC streams
        rtmp_to_rtc on;
        # WebRTC publishers are available as RTMP streams
        rtc_to_rtmp on;
        nack        on;
        twcc        on;
        # Reduce jitter buffer for lower latency
        pli_for_rtmp    6000;
    }

    hls {
        enabled     on;
        hls_path    ./objs/nginx/html;
        hls_fragment 2;
        hls_window  10;
        hls_dispose 300;
    }
}
